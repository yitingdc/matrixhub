name: Task Issue Checklist Guard

on:
  issues:
    types:
      - closed

permissions:
  issues: write

jobs:
  reopen-incomplete-checklist:
    runs-on: ubuntu-latest
    steps:
      - name: Reopen issue when completion checklist is incomplete
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title ?? '';

            if (!/^\[(Backend|QA|Doc)\]/i.test(title)) {
              core.info(`Skipping #${issue.number}: not a Backend/QA/Doc task issue.`);
              return;
            }

            const body = issue.body ?? '';

            function findChecklistSection(text) {
              const headerPatterns = [
                /\*\*Completion checklist\*\*:\s*/i,
                /\*\*Completion checklist\*\*\s*/i,
                /^#{1,3}\s+Completion checklist\s*:?\s*$/im,
              ];
              for (const pattern of headerPatterns) {
                const match = text.match(pattern);
                if (match) {
                  return text.slice(match.index + match[0].length);
                }
              }
              return null;
            }

            const afterMarker = findChecklistSection(body);
            if (afterMarker === null) {
              core.info(`Skipping #${issue.number}: no completion checklist section found.`);
              return;
            }

            const endMarkers = [
              '\nThe artifacts above',
              '\nBefore closing this issue',
              '\nBefore closing:',
            ];
            let endIdx = afterMarker.length;
            for (const endMarker of endMarkers) {
              const idx = afterMarker.indexOf(endMarker);
              if (idx !== -1 && idx < endIdx) {
                endIdx = idx;
              }
            }

            const section = afterMarker.slice(0, endIdx);
            const unchecked = [];
            for (const line of section.split('\n')) {
              const match = line.match(/^\s*-\s+\[ \]\s*(.+)$/);
              if (match) {
                unchecked.push(match[1].trim());
              }
            }

            if (unchecked.length === 0) {
              core.info(`Issue #${issue.number} checklist is complete.`);
              return;
            }

            const list = unchecked.map((item) => `- ${item}`).join('\n');
            const comment = [
              'This issue was reopened because the following **Completion checklist** items are still unchecked:',
              '',
              list,
              '',
              'Please complete all checklist items before closing this issue.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: comment,
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              state: 'open',
            });

            core.info(`Reopened #${issue.number} with ${unchecked.length} unchecked checklist item(s).`);
